name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - name: Composer cache
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPUnit
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Composer audit
        run: composer audit --no-dev || true

      - name: Upload coverage
        if: matrix.php == '8.2'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify DCO sign-off
        run: |
          # All commits in the PR must contain a Signed-off-by trailer matching the author.
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          fail=0
          for sha in $(git rev-list "$base..$head"); do
            if ! git log -1 --format=%B "$sha" | grep -q "^Signed-off-by: "; then
              echo "Commit $sha missing DCO sign-off (use 'git commit -s')"
              fail=1
            fi
          done
          exit $fail
