sonar.projectKey=opensalestax-bagisto
sonar.projectName=opensalestax-bagisto
sonar.projectVersion=0.1.0-alpha.1
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.exclusions=**/vendor/**,**/build/**,**/coverage*/**,src/Config/**
sonar.test.inclusions=tests/Unit/**/*Test.php
sonar.host.url=http://10.32.161.205:9000

# Exclusions with rationale (each line documents WHY):
#
# php:S2068 (hardcoded credentials) — UrlValidator hardcodes the CGNAT range
#   100.64.0.0/10 as a literal (RFC 6598). It is a well-known IP range, not a
#   credential. The same goes for RFC1918 / loopback / link-local literals.
# php:S1135 (TODO comments) — flagged on intentional v0.2-deferred markers;
#   each is paired with an issue tracker reference.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=src/Support/UrlValidator.php
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S1135
sonar.issue.ignore.multicriteria.e2.resourceKey=src/**/*.php
